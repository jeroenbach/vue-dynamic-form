packages:
  - 'packages/*'
  - '!playgrounds'
  - '!docs'

overrides:
  "minimatch@<3.1.3": "3.1.5"
  "minimatch@>=9.0.0 <9.0.7": "9.0.9"
  "flatted@<3.4.0": "3.4.2"
  "picomatch@<2.3.2": "2.3.2"
  "picomatch@>=4.0.0 <4.0.4": "4.0.4"
  "lodash@<4.18.1": "4.18.1"
  "ws@>=8.0.0 <8.21.0": "8.21.0"
  "vite@>=7.0.0 <7.3.6": "7.3.6"
  "rollup@>=4.0.0 <4.59.0": "4.59.0"
  "form-data@>=4.0.0 <4.0.6": "4.0.6"
  "js-cookie@<3.0.6": "3.0.6"
  "tmp@<0.2.7": "0.2.7"
  "glob@>=10.2.0 <10.5.0": "10.5.0"

allowBuilds:
  '@tailwindcss/oxide': true
  esbuild: true
  vue-demi: true

catalogs:
  build:
    '@vitejs/plugin-vue': 6.0.1
    tsc-alias: 1.8.17
    vite: 7.3.6
    vue-tsc: 3.0.5

  dev:
    '@antfu/eslint-config': 5.2.1
    eslint: 9.33.0
    eslint-plugin-format: 1.0.1

  framework:
    '@bach.software/vue-dynamic-form': '>=0.1.0'
    '@vee-validate/rules': '>=4.12'
    element-plus: '>=2.0.0'
    vee-validate: '>=4.12'
    vue: '>=3.5.18'

  framework-pinned:
    element-plus: 2.14.2

  test:
    '@vitest/coverage-v8': 3.2.6
    '@vue/test-utils': 2.4.6
    jsdom: 26.0.0
    vitest: 3.2.6

  tooling:
    '@changesets/cli': 2.29.5

  types:
    '@types/node': 24.2.1
    typescript: 5.9.2
